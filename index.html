<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Games</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@200;300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:      #f5f4f0;
    --surface: #eceae3;
    --border:  #dedad2;
    --text:    #1a1a18;
    --muted:   #999890;
    --snake:   #1a1a18;
    --ramadan: #d4af37;
    --ramadan-bg: #07103a;
  }

  html, body {
    min-height: 100%;
    background: var(--bg);
    font-family: 'DM Sans', system-ui, sans-serif;
    color: var(--text);
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 32px 20px;
    gap: 0;
  }

  /* ── Header ── */
  header {
    text-align: center;
    margin-bottom: 48px;
  }

  .site-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    font-weight: 300;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--muted);
    display: block;
    margin-bottom: 10px;
  }

  header h1 {
    font-family: 'DM Mono', monospace;
    font-weight: 400;
    font-size: clamp(28px, 6vw, 42px);
    letter-spacing: -0.02em;
    color: var(--text);
    line-height: 1;
  }

  header p {
    margin-top: 10px;
    font-size: 14px;
    font-weight: 200;
    color: var(--muted);
  }

  /* ── Game Grid ── */
  .games {
    display: flex;
    flex-direction: column;
    gap: 16px;
    width: 100%;
    max-width: 420px;
  }

  /* ── Card ── */
  .card {
    display: block;
    text-decoration: none;
    border-radius: 12px;
    overflow: hidden;
    position: relative;
    transition: transform 0.18s ease, box-shadow 0.18s ease;
    box-shadow: 0 2px 8px rgba(0,0,0,0.07), 0 0 0 1px var(--border);
  }

  .card:active { transform: scale(0.97); }

  @media (hover: hover) {
    .card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,0.12), 0 0 0 1px var(--border); }
  }

  .card-inner {
    display: flex;
    align-items: center;
    gap: 20px;
    padding: 22px 24px;
  }

  /* Preview area */
  .card-preview {
    width: 72px;
    height: 72px;
    border-radius: 10px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 36px;
    position: relative;
    overflow: hidden;
  }

  /* Card info */
  .card-info { flex: 1; min-width: 0; }

  .card-tag {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    font-weight: 400;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    margin-bottom: 4px;
    display: block;
  }

  .card-title {
    font-family: 'DM Mono', monospace;
    font-size: 20px;
    font-weight: 500;
    letter-spacing: -0.01em;
    line-height: 1.1;
    margin-bottom: 6px;
  }

  .card-desc {
    font-size: 12px;
    font-weight: 300;
    color: var(--muted);
    line-height: 1.5;
  }

  .card-arrow {
    font-size: 18px;
    opacity: 0.3;
    flex-shrink: 0;
    transition: opacity 0.15s, transform 0.15s;
  }
  .card:hover .card-arrow { opacity: 0.7; transform: translateX(3px); }

  /* ── Snake card ── */
  .card-snake {
    background: var(--bg);
  }

  .preview-snake {
    background: var(--surface);
  }

  .card-snake .card-tag  { color: var(--muted); }
  .card-snake .card-title { color: var(--snake); }

  /* Mini snake canvas */
  #snakePreview {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
  }

  /* ── Ramadan card ── */
  .card-ramadan {
    background: var(--ramadan-bg);
  }

  .preview-ramadan {
    background: rgba(212,175,55,0.1);
    border: 1px solid rgba(212,175,55,0.25);
  }

  .card-ramadan .card-tag  { color: rgba(212,175,55,0.6); }
  .card-ramadan .card-title { color: var(--ramadan); text-shadow: 0 0 20px rgba(212,175,55,0.4); }
  .card-ramadan .card-desc  { color: rgba(212,175,55,0.45); }
  .card-ramadan .card-arrow { color: var(--ramadan); }

  .ramadan-icon {
    font-size: 34px;
    filter: drop-shadow(0 0 8px rgba(212,175,55,0.8));
    animation: float 3s ease-in-out infinite;
  }

  @keyframes float {
    0%,100% { transform: translateY(0); }
    50%      { transform: translateY(-5px); }
  }

  /* ── Footer ── */
  footer {
    margin-top: 48px;
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--border);
    text-align: center;
  }
</style>
</head>
<body>

<header>
  <span class="site-label">My Games</span>
  <h1>Play</h1>
  <p>Two games, tap to play</p>
</header>

<div class="games">

  <!-- Snake -->
  <a class="card card-snake" href="snake.html">
    <div class="card-inner">
      <div class="card-preview preview-snake">
        <canvas id="snakePreview"></canvas>
      </div>
      <div class="card-info">
        <span class="card-tag">Classic</span>
        <div class="card-title">Snake</div>
        <div class="card-desc">Eat, grow, don't crash.<br>Speed increases as you score.</div>
      </div>
      <span class="card-arrow">→</span>
    </div>
  </a>

  <!-- Ramadan Flap -->
  <a class="card card-ramadan" href="ramadan.html">
    <div class="card-inner">
      <div class="card-preview preview-ramadan">
        <span class="ramadan-icon">🌙</span>
      </div>
      <div class="card-info">
        <span class="card-tag">رمضان</span>
        <div class="card-title">فلاب رمضان</div>
        <div class="card-desc">Fly through the minarets.<br>How far can you go?</div>
      </div>
      <span class="card-arrow" style="color: #d4af37">→</span>
    </div>
  </a>

</div>

<footer>Tap a game to play</footer>

<script>
// ── Mini animated snake preview ──
const previewCanvas = document.getElementById('snakePreview');
const pCtx = previewCanvas.getContext('2d');
const COLS = 10, ROWS = 10;
let pCell;

function resizePreview() {
  const wrap = previewCanvas.parentElement;
  previewCanvas.width  = wrap.offsetWidth;
  previewCanvas.height = wrap.offsetHeight;
  pCell = Math.floor(Math.min(previewCanvas.width, previewCanvas.height) / COLS);
}

resizePreview();
window.addEventListener('resize', resizePreview);

// Small demo snake
let dSnake = [{x:5,y:5},{x:4,y:5},{x:3,y:5}];
let dDir   = {x:1,y:0};
let dFood  = {x:7,y:3};
let dStep  = 0;

function demoStep() {
  dStep++;
  if (dStep % 12 !== 0) return;

  // Simple AI: head toward food
  const head = dSnake[0];
  const dx = dFood.x - head.x, dy = dFood.y - head.y;
  if (Math.abs(dx) >= Math.abs(dy)) {
    dDir = dx > 0 ? {x:1,y:0} : {x:-1,y:0};
  } else {
    dDir = dy > 0 ? {x:0,y:1} : {x:0,y:-1};
  }

  const newHead = {x: (head.x + dDir.x + COLS) % COLS, y: (head.y + dDir.y + ROWS) % ROWS};
  dSnake.unshift(newHead);

  if (newHead.x === dFood.x && newHead.y === dFood.y) {
    dFood = {x: Math.floor(Math.random()*COLS), y: Math.floor(Math.random()*ROWS)};
  } else {
    dSnake.pop();
  }
  if (dSnake.length > 6) dSnake.pop();
}

function drawPreview() {
  requestAnimationFrame(drawPreview);
  demoStep();

  const w = previewCanvas.width, h = previewCanvas.height;
  pCtx.fillStyle = '#eceae3';
  pCtx.fillRect(0, 0, w, h);

  // Grid dots
  pCtx.fillStyle = '#e0ded8';
  for (let x = 0; x < COLS; x++) {
    for (let y = 0; y < ROWS; y++) {
      pCtx.beginPath();
      pCtx.arc(x*pCell + pCell/2, y*pCell + pCell/2, 1, 0, Math.PI*2);
      pCtx.fill();
    }
  }

  // Food
  pCtx.fillStyle = '#d45c38';
  pCtx.beginPath();
  pCtx.arc(dFood.x*pCell + pCell/2, dFood.y*pCell + pCell/2, pCell*0.28, 0, Math.PI*2);
  pCtx.fill();

  // Snake
  dSnake.forEach((seg, i) => {
    const pad = 1;
    pCtx.fillStyle = i === 0 ? '#1a1a18' : '#3a3a36';
    pCtx.globalAlpha = i === 0 ? 1 : Math.max(0.3, 1 - i * 0.15);
    pCtx.beginPath();
    const s = pCell - pad*2;
    const r = i === 0 ? 3 : 2;
    const sx = seg.x*pCell + pad, sy = seg.y*pCell + pad;
    pCtx.moveTo(sx+r, sy);
    pCtx.lineTo(sx+s-r, sy); pCtx.quadraticCurveTo(sx+s,sy,sx+s,sy+r);
    pCtx.lineTo(sx+s,sy+s-r); pCtx.quadraticCurveTo(sx+s,sy+s,sx+s-r,sy+s);
    pCtx.lineTo(sx+r,sy+s); pCtx.quadraticCurveTo(sx,sy+s,sx,sy+s-r);
    pCtx.lineTo(sx,sy+r); pCtx.quadraticCurveTo(sx,sy,sx+r,sy);
    pCtx.fill();
  });
  pCtx.globalAlpha = 1;
}

drawPreview();
</script>
</body>
</html>
